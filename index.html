<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Tip calculator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="tip-calculator-wrapper l-container-center">
      <h1>
        <img src="./images/logo.svg" alt="" />
      </h1>
      <section class="tip-calculator">
        <form action="">
          <div class="tip-calculator__input flex-col">
            <div class="tip-calculator__bill flex-col">
              <label for="bill">Bill</label>
              <input type="text" id="bill" required placeholder="0" />
            </div>
            <fieldset class="tip-calculator__tip-percent">
              <legend>Select Tip %</legend>
              <select name="" id="tip-Input">
                <option selected value="5">5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="Custom">Custom</option>
              </select>
            </fieldset>
            <div class="tip-calculator__total-people flex-col">
              <label for="personNum">
                No of People
                <span class="error"></span>
              </label>
              <input
                type="number"
                id="personNum"
                required
                placeholder="0"
                id="personNum"
              />
            </div>
          </div>

          <div class="tip-calculator__result">
            <div class="tip-calculator__result-wrap">
              <div class="tip-calculator__Tip-amount grid-2">
                <p class="flex-col">Tip Amount / <span>person</span></p>
                <output class="tip-perPerson"></output>
              </div>
              <div class="tip-calculator__per-person grid-2">
                <p class="flex-col">Total / <span>person</span></p>
                <output class="total-perPerson"></output>
              </div>
            </div>

            <button class="tip-calculator__resetBtn" type="reset">reset</button>
          </div>
        </form>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>

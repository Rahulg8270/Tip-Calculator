<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Tip calculator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="l-container-center">
      <article class="calculator">
        <form action="" class="calculator__form">
          <div class="calculator__input">
            <fieldset class="calculator__bill">
              <div class="calculator__input-selection">
                <label for="bill" class="label-text">Bill</label>
                <span class="calculator__label-error error-hide"></span>
              </div>
              <div class="calculator__input-wrapper">
                <img src="./images/icon-dollar.svg" />
                <input
                  type="number"
                  class="calculator__real-input calculator__real-input--bill"
                  id="bill"
                  placeholder="0"
                />
              </div>
            </fieldset>
            <fieldset class="calculator__tip-container">
              <legend class="label-text label-tip">Select Tip%</legend>
              <div class="calculator__tip-layout">
                <div class="calculator__tip-option">
                  <input
                    class="calculator__tip-value"
                    type="radio"
                    name="tip"
                    id="tip-5"
                    value="5"
                  />
                  <label for="tip-5" class="calculator__tip-label">5%</label>
                </div>
                <div class="calculator__tip-option">
                  <input
                    class="calculator__tip-value"
                    type="radio"
                    name="tip"
                    id="tip-10"
                    value="10"
                  />
                  <label for="tip-10" class="calculator__tip-label">10%</label>
                </div>
                <div class="calculator__tip-option">
                  <input
                    class="calculator__tip-value"
                    type="radio"
                    name="tip"
                    id="tip-15"
                    value="15"
                  />
                  <label for="tip-15" class="calculator__tip-label">15%</label>
                </div>
                <div class="calculator__tip-option">
                  <input
                    class="calculator__tip-value"
                    type="radio"
                    name="tip"
                    id="tip-25"
                    value="25"
                  />
                  <label for="tip-25" class="calculator__tip-label">25%</label>
                </div>
                <div class="calculator__tip-option">
                  <input
                    class="calculator__tip-value"
                    type="radio"
                    name="tip"
                    id="tip-50"
                    value="50"
                  />
                  <label for="tip-50" class="calculator__tip-label">50%</label>
                </div>
                <div class="calculator__tip-option">
                  <input
                    class="calculator__tip-value calculator__tip-value--custom"
                    type="radio"
                    name="tip"
                    id="tip-custom"
                    value=""
                  />
                  <label for="tip-custom" class="calculator__tip-label"
                    >Custom</label
                  >
                </div>
              </div>
            </fieldset>
            <fieldset class="calculator__total-person">
              <div class="calculator__input-selection">
                <label for="people" class="label-text">No of People</label>
                <span class="calculator__label-error"></span>
              </div>
              <div class="calculator__input-wrapper">
                <img src="./images/icon-person.svg" alt="" />
                <input
                  type="number"
                  class="calculator__real-input calculator__real-input--people"
                  id="people"
                  placeholder="0"
                  min="1"
                  max="99"
                />
              </div>
            </fieldset>
          </div>
          <div class="calculator__result">
            <div class="calculator__result-outline">
              <div class="calculator__result-wrapper">
                <span class="calculator__output-label">
                  <strong>Tip Amount</strong>
                  <em>/ person</em>
                </span>
                <output class="calculator__output-num" id="tip-amount-perPerson"
                  >$0.0</output
                >
              </div>

              <div class="calculator__result-wrapper">
                <span class="calculator__output-label">
                  <strong>Total</strong>
                  <em>/ person</em>
                </span>
                <output
                  class="calculator__output-num"
                  id="total-amount-perPerson"
                  >$0.0</output
                >
              </div>
            </div>
            <button class="calculator__reset-btn" type="reset">RESET</button>
          </div>
        </form>
      </article>
    </main>
    <script src="index.js"></script>
  </body>
</html>
